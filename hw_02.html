	<select id="tenday" onchange="show()">
	</select>
	<script>
        let theDate = new Date()
        let dateStr = ""
        let optEle;
        let textEle;
        selectRoot = document.querySelector("#tenday")
        for (let i=0; i<10; i++) {
            dateStr = theDate.getFullYear() +"-"+String(theDate.getMonth()+1).padStart(2,'0');
            dateStr += "-" + String(theDate.getDate()).padStart(2,'0');
            textEle = document.createTextNode(dateStr);
            optEle =  document.createElement("option")
            optEle.value=dateStr;
            optEle.appendChild(textEle);
            selectRoot.appendChild(optEle);
            theDate.setDate(theDate.getDate()+1);
        }
