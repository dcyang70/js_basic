<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        fieldset {
            width: 500px;
            border: 1px solid #acd6ff;
            border-radius: 15px;
            margin: 15px;
        }

        legend {
            color: #0080FF;
            /* text-align: center; 
            border: 1px solid red;*/
            margin-left: 50px;
        }

        .st1 {
            width: 450px;
            border-bottom: 3px dashed #9D9D9D;
            margin: 20px;
            padding-bottom: 10px;
        }

        .sub {
            width: 450px;
            margin: 20px;
            text-align: center;
        }

        .t1 {
            width: 100px;
            /* border: 1px solid red; */
            float: left;
            text-align: right;
        }
    </style>
</head>

<body>

    <!-- <form action="#" method="get" enctype="multipart/form-data"> -->
        <!-- 這個# 表示reload 的意思 -->
    <form method="get" enctype="multipart/form-data">
        <fieldset>
            <legend>會員資料輸入</legend>
            <div class="st1">
                <label for="name1" class="t1"><span style="color:red">*</span>會員姓名:</label>
                <input type="text" id="name1" name="name1" autofocus autocomplete="off" size="10">
            </div>
            <div class="st1">
                <label class="t1">性別:</label>
                <label>
                    <input type="radio" name="gender" value="male" id="" required checked>男
                </label>
                <label>
                    <input type="radio" name="gender" value="female" id="">女
                </label>

            </div>
            <div class="st1">
                <label for="phone" class="t1"><span style="color:red">*</span>電話:</label>
                <input type="text" name="phone" id="phone" autocomplete="off">
            </div>
            <div class="st1">
                <label for="email" class="t1"><span style="color:red">*</span>電子信箱:</label>
                <input type="text" name="email1" id="email" autocomplete="off">
            </div>
            <div class="st1">
                <label for="account1" class="t1"><span style="color:red">*</span>帳號:</label>
                <input type="text" id="account1" name="account" autocomplete="off">
            </div>
            <div class="st1">
                <label for="pwd1" class="t1"><span style="color:red">*</span>密碼:</label>
                <input type="password" id="pwd1" name="pwd1" minlength="6">
            </div>
            <div class="st1">
                <label for="pwd2" class="t1"><span style="color:red">*</span>確認密碼:</label>
                <input type="password" id="pwd2" name="pwd2" minlength="6">
            </div>
        </fieldset>
        <div class="sub">
            <input type="button" onclick="checkContent()" value="送出">
            <input type="reset" value="清除">
        </div>
    </form>
    <script>
        function checkContent(){
            elems = document.getElementsByTagName("input")
            for (let i of elems){
                console.log(i, i.name, i.type, i.value);
                if (i.type == 'text' || i.type == 'password')
                    if (i.value === ""){
                        let label = document.querySelector(`label[for=${i.id}]`);
                        alert(`${label.innerText} cannot be empty`);
                        i.focus() 
                        return
                    }
                switch(i.id){
                    case "email1":
                        if (email1.indexOf('@') == -1 || email1.indexOf('.') == -1 ){
                            alert(`email format error`);
                            i.focus();
                            return;
                        }
                        break;
                    case "pwd1":
                        if (pwd1.value !== pwd2.value) {
                            alert("Passwords are different");
                            i.focus();
                            return;
                        }
                        break;
                    case "phone":
                        if (isNaN(phone.value)) {
                            i.focus();
                            return;
                        }

                        break;
                }
            }
        }


    </script>
</body>

</html>
